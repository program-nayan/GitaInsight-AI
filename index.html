<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gita Insight AI</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 90%;
            max-width: 800px;
            background-color: #1e1e1e;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            height: 85vh;
            border: 1px solid #333;
        }

        .header {
            padding: 20px;
            text-align: center;
            background-color: #2c2c2c;
            border-bottom: 1px solid #444;
            border-radius: 10px 10px 0 0;
        }

        .header h1 {
            margin: 0;
            color: #f39c12;
        }

        .chat-history {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            max-width: 80%;
            line-height: 1.5;
        }

        .ai-message {
            background-color: #2c2c2c;
            align-self: flex-start;
            border-left: 4px solid #f39c12;
        }

        .user-message {
            background-color: #f39c12;
            color: #121212;
            align-self: flex-end;
        }

        .input-area {
            display: flex;
            padding: 20px;
            background-color: #2c2c2c;
            border-top: 1px solid #444;
            border-radius: 0 0 10px 10px;
        }

        input {
            flex-grow: 1;
            padding: 15px;
            border: none;
            border-radius: 5px;
            background-color: #444;
            color: white;
            font-size: 16px;
        }

        button {
            margin-left: 10px;
            padding: 15px 25px;
            background-color: #f39c12;
            color: #121212;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }

        .shloka-box {
            background-color: #121212;
            padding: 15px;
            margin-top: 15px;
            border-radius: 5px;
            font-size: 14px;
        }

        .shloka-sanskrit {
            font-style: italic;
            margin-bottom: 10px;
            color: #ccc;
        }
    </style>
</head>

<body>

    <div class="chat-container">
        <div class="header">
            <h1>Gita Insight AI</h1>
        </div>

        <div class="chat-history" id="chatHistory">
            <div class="message ai-message">
                Pranam. How may the wisdom of the Bhagavad Gita guide you today?
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Describe your situation..." autocomplete="off">
            <button onclick="sendMessage()">Ask</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const inputField = document.getElementById('userInput');
            const chatHistory = document.getElementById('chatHistory');
            const text = inputField.value.trim();

            if (!text) return;

            // Display user message
            const userDiv = document.createElement('div');
            userDiv.className = 'message user-message';
            userDiv.textContent = text;
            chatHistory.appendChild(userDiv);

            inputField.value = '';

            // Show loading
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message ai-message';
            loadingDiv.textContent = 'Seeking guidance...';
            loadingDiv.id = 'loadingMsg';
            chatHistory.appendChild(loadingDiv);

            // Scroll to bottom
            chatHistory.scrollTop = chatHistory.scrollHeight;

            try {
                // Call Flask API
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ scenario: text })
                });

                const data = await response.json();
                document.getElementById('loadingMsg').remove();

                if (data.error) {
                    alert(data.error);
                    return;
                }

                // Display AI Response
                const aiDiv = document.createElement('div');
                aiDiv.className = 'message ai-message';

                // Add Summary Text
                let htmlContent = `<p>${data.spiritual_summary.replace(/\n/g, '<br>')}</p>`;

                // Add Shloka Cards
                if (data.shlokas) {
                    data.shlokas.forEach(s => {
                        htmlContent += `
                    <div class="shloka-box">
                        <strong style="color:#f39c12;">${s.chapter_name} - Verse ${s.verse}</strong>
                        <div class="shloka-sanskrit">${s.sanskrit}</div>
                        <div>Meaning: ${s.translation}</div>
                    </div>`;
                    });
                }

                aiDiv.innerHTML = htmlContent;
                chatHistory.appendChild(aiDiv);
                chatHistory.scrollTop = chatHistory.scrollHeight;

            } catch (err) {
                document.getElementById('loadingMsg').remove();
                alert("Connection error to server.");
            }
        }

        // Press Enter to send
        document.getElementById("userInput").addEventListener("keypress", function (event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendMessage();
            }
        });
    </script>

</body>

</html>
