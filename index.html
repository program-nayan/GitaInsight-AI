<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gita Insight AI</title>
    <style>
        /* Fullscreen background */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRp04JkBPQwexiph2azEtLyu4PEE5m9hjdFmA&s') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Main wrapper: Totally transparent */
        .chat-container {
            width: 90%;
            max-width: 700px;
            height: 80vh;
            background: transparent;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 20px;
            text-align: center;
            color: #f39c12;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .chat-history {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
        }

        /* The Opaque Chat Bubbles */
        .message {
            padding: 18px;
            margin-bottom: 15px;
            border-radius: 15px;
            line-height: 1.6;
            max-width: 85%;
            /* OPAQUE BACKGROUNDS */
            background: rgba(20, 20, 20, 0.9);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ai-message {
            align-self: flex-start;
            border-left: 5px solid #f39c12;
        }

        .user-message {
            align-self: flex-end;
            background: rgba(243, 156, 18, 0.9);
            color: #000;
        }

        /* The Opaque Input Area */
        .input-area {
            padding: 20px;
            background: rgba(20, 20, 20, 0.9);
            border-radius: 15px;
            display: flex;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            border: none;
            background: #333;
            color: white;
        }

        button {
            padding: 10px 25px;
            background: #f39c12;
            color: #000;
            font-weight: bold;
            border-radius: 10px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="chat-container">
        <div class="header">
            <h1>Gita Insight AI</h1>
        </div>

        <div class="chat-history" id="chatHistory">
            <div class="message ai-message">
                Pranam. How may the wisdom of the Bhagavad Gita guide you today?
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Describe your situation..." autocomplete="off">
            <button onclick="sendMessage()">Ask</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const inputField = document.getElementById('userInput');
            const chatHistory = document.getElementById('chatHistory');
            const text = inputField.value.trim();

            if (!text) return;

            // Display user message
            const userDiv = document.createElement('div');
            userDiv.className = 'message user-message';
            userDiv.textContent = text;
            chatHistory.appendChild(userDiv);

            inputField.value = '';

            // Show loading
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message ai-message';
            loadingDiv.textContent = 'Seeking guidance...';
            loadingDiv.id = 'loadingMsg';
            chatHistory.appendChild(loadingDiv);

            // Scroll to bottom
            chatHistory.scrollTop = chatHistory.scrollHeight;

            try {
                // Call Flask API
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ scenario: text })
                });

                const data = await response.json();
                document.getElementById('loadingMsg').remove();

                if (data.error) {
                    alert(data.error);
                    return;
                }

                // Display AI Response
                const aiDiv = document.createElement('div');
                aiDiv.className = 'message ai-message';

                // Add Summary Text
                let htmlContent = `<p>${data.spiritual_summary.replace(/\n/g, '<br>')}</p>`;

                // Add Shloka Cards
                if (data.shlokas) {
                    data.shlokas.forEach(s => {
                        htmlContent += `
                    <div class="shloka-box">
                        <strong style="color:#f39c12;">${s.chapter_name} - Verse ${s.verse}</strong>
                        <div class="shloka-sanskrit">${s.sanskrit}</div>
                        <div>Meaning: ${s.translation}</div>
                    </div>`;
                    });
                }

                aiDiv.innerHTML = htmlContent;
                chatHistory.appendChild(aiDiv);
                chatHistory.scrollTop = chatHistory.scrollHeight;

            } catch (err) {
                document.getElementById('loadingMsg').remove();
                alert("Connection error to server.");
            }
        }

        // Press Enter to send
        document.getElementById("userInput").addEventListener("keypress", function (event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendMessage();
            }
        });
    </script>

</body>

</html>
